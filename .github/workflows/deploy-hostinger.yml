name: Deploy Portfolio to Hostinger

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: portfolio-hostinger-deploy
  cancel-in-progress: true

jobs:
  build-and-deploy:
    name: Build and deploy static portfolio
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build and validate portfolio
        run: npm run check

      - name: Verify build output
        run: |
          test -d dist
          test -f dist/index.html

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Deploy dist to Hostinger via SFTP
        env:
          HOSTINGER_HOST: ${{ secrets.HOSTINGER_HOST }}
          HOSTINGER_USERNAME: ${{ secrets.HOSTINGER_USERNAME }}
          HOSTINGER_PASSWORD: ${{ secrets.HOSTINGER_PASSWORD }}
          HOSTINGER_PORT: ${{ secrets.HOSTINGER_PORT }}
          HOSTINGER_TARGET_DIR: ${{ secrets.HOSTINGER_TARGET_DIR }}
        run: |
          lftp -u "$HOSTINGER_USERNAME","$HOSTINGER_PASSWORD" -p "$HOSTINGER_PORT" sftp://"$HOSTINGER_HOST" <<EOF
          set sftp:auto-confirm yes
          set net:max-retries 2
          set net:timeout 20
          mirror --reverse --delete --verbose ./dist "$HOSTINGER_TARGET_DIR"
          bye
          EOF
