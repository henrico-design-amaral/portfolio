<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 450" width="360" height="450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2a2520"/>
      <stop offset="100%" stop-color="#1c1815"/>
    </linearGradient>
    <linearGradient id="warm" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#BE9C6E" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#BE9C6E" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#BE9C6E" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#D4B896" stop-opacity="0.15"/>
    </linearGradient>
    <clipPath id="frame">
      <rect width="360" height="450" rx="0"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="360" height="450" fill="url(#bg)"/>

  <!-- Warm duotone overlay -->
  <rect width="360" height="450" fill="url(#warm)"/>

  <!-- Abstract geometric portrait -->

  <!-- Shoulder / torso -->
  <path d="M90 320 Q100 240 130 200 L230 200 Q260 240 270 320 Z"
        fill="#BE9C6E" opacity="0.08"/>

  <!-- Collar / neckline -->
  <path d="M150 200 Q180 190 210 200 L205 220 Q180 215 155 220 Z"
        fill="#BE9C6E" opacity="0.12"/>

  <!-- Head shape -->
  <ellipse cx="180" cy="145" rx="48" ry="58" fill="none"
           stroke="url(#accent)" stroke-width="1.5"/>

  <!-- Face structure lines - geometric -->
  <!-- Left side -->
  <line x1="145" y1="120" x2="165" y2="130" stroke="#BE9C6E" stroke-width="1" opacity="0.2"/>
  <line x1="142" y1="140" x2="160" y2="145" stroke="#BE9C6E" stroke-width="1" opacity="0.15"/>

  <!-- Right side -->
  <line x1="215" y1="120" x2="195" y2="130" stroke="#BE9C6E" stroke-width="1" opacity="0.2"/>
  <line x1="218" y1="140" x2="200" y2="145" stroke="#BE9C6E" stroke-width="1" opacity="0.15"/>

  <!-- Eye level horizontal -->
  <line x1="155" y1="130" x2="205" y2="130" stroke="#BE9C6E" stroke-width="0.5" opacity="0.12"/>

  <!-- Center line -->
  <line x1="180" y1="90" x2="180" y2="200" stroke="#BE9C6E" stroke-width="0.5" opacity="0.06"/>

  <!-- Mouth level line -->
  <line x1="160" y1="165" x2="200" y2="165" stroke="#BE9C6E" stroke-width="0.5" opacity="0.1"/>

  <!-- Decorative geometric accents -->
  <circle cx="180" cy="145" r="55" fill="none" stroke="#BE9C6E" stroke-width="0.3" opacity="0.1"/>
  <circle cx="180" cy="145" r="62" fill="none" stroke="#BE9C6E" stroke-width="0.3" opacity="0.06"/>

  <!-- Subtle nodes -->
  <circle cx="155" cy="128" r="1.5" fill="#BE9C6E" opacity="0.25"/>
  <circle cx="205" cy="128" r="1.5" fill="#BE9C6E" opacity="0.25"/>
  <circle cx="180" cy="165" r="1" fill="#BE9C6E" opacity="0.15"/>

  <!-- Horizontal rule at bottom -->
  <line x1="60" y1="410" x2="300" y2="410" stroke="#BE9C6E" stroke-width="0.5" opacity="0.15"/>

  <!-- Small diamond -->
  <polygon points="180,398 185,403 180,408 175,403"
           fill="#BE9C6E" opacity="0.2"/>
</svg>
